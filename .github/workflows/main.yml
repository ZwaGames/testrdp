name: Windows_RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Create User and Enable RDP
        run: |
          net user "Colabuser" "Reelspro@123" /add
          net localgroup administrators "Colabuser" /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      - name: Download & Start Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          .\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          Start-Process -NoNewWindow -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 5
      - name: Get RDP Info
        run: |
          $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $public_url = $response.tunnels[0].public_url
          Write-Host "=========================================="
          Write-Host "✅ RDP is Ready!"
          Write-Host "IP Address : $($public_url.Replace('tcp://', ''))"
          Write-Host "Username   : Colabuser"
          Write-Host "Password   : Reelspro@123"
          Write-Host "=========================================="
      - name: Keep Alive (6 Hours)
        run: Start-Sleep -Seconds 21600
